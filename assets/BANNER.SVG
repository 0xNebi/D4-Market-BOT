<svg width="900" height="200" viewBox="0 0 900 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes frame-glow {
      0%, 100% { stroke-opacity: 0.3; stroke-width: 1.2; }
      50% { stroke-opacity: 0.9; stroke-width: 1.5; }
    }
    /* Klucz do płynności: przesunięcie o dokładnie 28 jednostek (suma 20+8) */
    @keyframes frame-dash {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -28; } 
    }
    @keyframes skull-fade {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    @keyframes text-in {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .frame-animated {
      /* Liniowe tempo (linear) gwarantuje brak zwolnień/przyspieszeń na łączeniu pętli */
      animation: frame-glow 3s ease-in-out infinite, frame-dash 1.5s linear infinite;
    }
    .skull-anim {
      animation: skull-fade 4s ease-in-out infinite;
    }
    .title-anim {
      animation: text-in 1s ease-out forwards;
    }
    .sub-anim {
      animation: text-in 1.4s ease-out forwards;
    }
  </style>

  <rect width="900" height="200" fill="#0a0a0a"/>

  <defs>
    <radialGradient id="bg-glow" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <filter id="green-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="text-shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#10b981" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="900" height="200" fill="url(#bg-glow)"/>

  <rect x="4" y="4" width="892" height="192" rx="2" ry="2"
    fill="none"
    stroke="#10b981"
    stroke-width="1.2"
    stroke-dasharray="20 8"
    class="frame-animated"
  />

  <rect x="8" y="8" width="884" height="184" rx="1" ry="1"
    fill="none"
    stroke="#10b981"
    stroke-width="0.5"
    stroke-opacity="0.15"
  />

